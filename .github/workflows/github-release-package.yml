name: github-release-package

on:
  workflow_dispatch:
    inputs:
      private_engine_run_id:
        description: "Private engine publish run id (optional)"
        required: false
        type: string
      private_engine_release_tag:
        description: "Private engine release tag (optional)"
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release-package:
    runs-on: windows-latest

    steps:
      - name: Checkout IndigoMovieManager_fork
        uses: actions/checkout@v4
        with:
          path: IndigoMovieManager_fork

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Try sync private engine publish source
        id: sync_private_engine
        shell: pwsh
        working-directory: IndigoMovieManager_fork
        env:
          IMM_PRIVATE_ENGINE_TOKEN: ${{ secrets.INDIGO_ENGINE_REPO_TOKEN }}
          PRIVATE_ENGINE_RUN_ID_INPUT: ${{ inputs.private_engine_run_id }}
          PRIVATE_ENGINE_RUN_ID_PIN: ${{ vars.PRIVATE_ENGINE_PUBLISH_RUN_ID }}
          PRIVATE_ENGINE_RELEASE_TAG_INPUT: ${{ inputs.private_engine_release_tag }}
          PRIVATE_ENGINE_RELEASE_TAG_PIN: ${{ vars.PRIVATE_ENGINE_RELEASE_TAG }}
        run: |
          $isTagRelease = "${{ github.ref_type }}" -eq "tag"
          $privateEngineReleaseTag = if (-not [string]::IsNullOrWhiteSpace($env:PRIVATE_ENGINE_RELEASE_TAG_INPUT)) {
            $env:PRIVATE_ENGINE_RELEASE_TAG_INPUT.Trim()
          }
          elseif (-not [string]::IsNullOrWhiteSpace($env:PRIVATE_ENGINE_RELEASE_TAG_PIN)) {
            $env:PRIVATE_ENGINE_RELEASE_TAG_PIN.Trim()
          }
          elseif ($isTagRelease) {
            "${{ github.ref_name }}".Trim()
          }
          else {
            ""
          }
          $privateEngineRunId = if (-not [string]::IsNullOrWhiteSpace($env:PRIVATE_ENGINE_RUN_ID_INPUT)) {
            $env:PRIVATE_ENGINE_RUN_ID_INPUT.Trim()
          }
          elseif (-not [string]::IsNullOrWhiteSpace($env:PRIVATE_ENGINE_RUN_ID_PIN)) {
            $env:PRIVATE_ENGINE_RUN_ID_PIN.Trim()
          }
          else {
            ""
          }

          if ([string]::IsNullOrWhiteSpace($env:IMM_PRIVATE_ENGINE_TOKEN)) {
            if ($isTagRelease -or
                -not [string]::IsNullOrWhiteSpace($privateEngineReleaseTag) -or
                -not [string]::IsNullOrWhiteSpace($privateEngineRunId)) {
              throw "Private engine source を明示した実行では token が必要です。"
            }

            "synced=false" >> $env:GITHUB_OUTPUT
            Write-Host "Private engine token が未設定なので、local worker build を使います。"
            exit 0
          }

          if (-not [string]::IsNullOrWhiteSpace($privateEngineReleaseTag)) {
            $syncArguments = @(
              "-NoLogo",
              "-NoProfile",
              "-File",
              "./scripts/sync_private_engine_worker_artifact.ps1",
              "-GitHubToken", $env:IMM_PRIVATE_ENGINE_TOKEN,
              "-ReleaseTag", $privateEngineReleaseTag
            )

            & pwsh @syncArguments
            if ($LASTEXITCODE -ne 0) {
              throw "Private GitHub Release asset の同期に失敗しました。"
            }

            "synced=true" >> $env:GITHUB_OUTPUT
            exit 0
          }

          if ([string]::IsNullOrWhiteSpace($privateEngineRunId)) {
            "synced=false" >> $env:GITHUB_OUTPUT
            Write-Host "Private engine run id が未指定なので、preview は local worker build を使います。"
            exit 0
          }

          $syncArguments = @(
            "-NoLogo",
            "-NoProfile",
            "-File",
            "./scripts/sync_private_engine_worker_artifact.ps1",
            "-GitHubToken", $env:IMM_PRIVATE_ENGINE_TOKEN,
            "-RunId", $privateEngineRunId
          )

          & pwsh @syncArguments
          if ($LASTEXITCODE -ne 0) {
            throw "Private engine publish artifact の同期に失敗しました。"
          }

          "synced=true" >> $env:GITHUB_OUTPUT

      - name: Create release package
        shell: pwsh
        working-directory: IndigoMovieManager_fork
        run: |
          # タグ実行時はタグ名をそのまま配布ラベルへ流し、手動実行時は run 番号へ逃がす。
          $versionLabel = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}" } else { "manual-${{ github.run_number }}" }
          $packageArguments = @(
            "-NoLogo",
            "-NoProfile",
            "-File",
            "./scripts/create_github_release_package.ps1",
            "-Configuration",
            "Release",
            "-Runtime",
            "win-x64",
            "-OutputRoot",
            "artifacts/github-release",
            "-VersionLabel",
            $versionLabel
          )

          # Private engine artifact が同期済みの時だけ、その publish 出力を app package へ同梱する。
          if ("${{ steps.sync_private_engine.outputs.synced }}" -eq "true") {
            $packageArguments += @(
              "-PreparedWorkerPublishDir",
              "artifacts/rescue-worker/publish/Release-win-x64"
            )
          } else {
            # local worker source build を使う時も、workflow 側から明示 opt-in する。
            $packageArguments += "-AllowLocalWorkerSourceBuild"
          }

          & pwsh @packageArguments
          if ($LASTEXITCODE -ne 0) {
            throw "release package 作成に失敗しました。"
          }

      - name: Upload app release artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-release-package
          path: IndigoMovieManager_fork/artifacts/github-release/*.zip
          if-no-files-found: error

      - name: Upload release body preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-release-body-preview
          path: IndigoMovieManager_fork/artifacts/github-release/release-worker-lock-summary-*.md
          if-no-files-found: error

      - name: Show release body preview in workflow summary
        shell: pwsh
        working-directory: IndigoMovieManager_fork
        run: |
          $summaryFile = Get-ChildItem -Path artifacts/github-release -Filter 'release-worker-lock-summary-*.md' -File | Select-Object -First 1
          if ($null -eq $summaryFile) {
            throw "release body preview markdown が見つかりません。"
          }

          $summaryContent = Get-Content -LiteralPath $summaryFile.FullName -Raw -Encoding utf8
          $releaseBodyBlockMatch = [regex]::Match($summaryContent, '(?s)~~~md\s*(.+?)\s*~~~')
          if (-not $releaseBodyBlockMatch.Success) {
            throw "release body preview markdown の本文ブロックを抽出できません。"
          }

          $summaryText = @"
          ## Release Body Preview

          Source: `$($summaryFile.Name)`

          $($releaseBodyBlockMatch.Groups[1].Value.Trim())
          "@

          $utf8NoBom = [System.Text.UTF8Encoding]::new($false)
          [System.IO.File]::AppendAllText($env:GITHUB_STEP_SUMMARY, $summaryText, $utf8NoBom)

      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: IndigoMovieManager_fork/artifacts/github-release/*.zip
          body_path: IndigoMovieManager_fork/artifacts/github-release/release-worker-lock-summary-${{ github.ref_name }}-win-x64.md
          generate_release_notes: true
