name: github-release-package

on:
  workflow_dispatch:
    inputs:
      private_engine_run_id:
        description: "Private engine publish run id (optional)"
        required: false
        type: string
      private_engine_release_tag:
        description: "Private engine release tag (optional)"
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release-package:
    runs-on: windows-latest

    steps:
      - name: Checkout IndigoMovieManager_fork
        uses: actions/checkout@v4
        with:
          path: IndigoMovieManager_fork

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Try sync private engine publish source
        id: sync_private_engine
        shell: pwsh
        working-directory: IndigoMovieManager_fork
        env:
          IMM_PRIVATE_ENGINE_TOKEN: ${{ secrets.INDIGO_ENGINE_REPO_TOKEN }}
          PUBLIC_ENGINE_MIRROR_REPO: ${{ vars.PUBLIC_ENGINE_MIRROR_REPO }}
          PRIVATE_ENGINE_RUN_ID_INPUT: ${{ inputs.private_engine_run_id }}
          PRIVATE_ENGINE_RUN_ID_PIN: ${{ vars.PRIVATE_ENGINE_PUBLISH_RUN_ID }}
          PRIVATE_ENGINE_RELEASE_TAG_INPUT: ${{ inputs.private_engine_release_tag }}
          PRIVATE_ENGINE_RELEASE_TAG_PIN: ${{ vars.PRIVATE_ENGINE_RELEASE_TAG }}
        run: |
          $isTagRelease = "${{ github.ref_type }}" -eq "tag"
          $privateEngineReleaseTag = if (-not [string]::IsNullOrWhiteSpace($env:PRIVATE_ENGINE_RELEASE_TAG_INPUT)) {
            $env:PRIVATE_ENGINE_RELEASE_TAG_INPUT.Trim()
          }
          elseif (-not [string]::IsNullOrWhiteSpace($env:PRIVATE_ENGINE_RELEASE_TAG_PIN)) {
            $env:PRIVATE_ENGINE_RELEASE_TAG_PIN.Trim()
          }
          elseif ($isTagRelease) {
            "${{ github.ref_name }}".Trim()
          }
          else {
            ""
          }
          $privateEngineRunId = ""
          $privateEngineRunIdSource = ""
          if (-not [string]::IsNullOrWhiteSpace($env:PRIVATE_ENGINE_RUN_ID_INPUT)) {
            $privateEngineRunId = $env:PRIVATE_ENGINE_RUN_ID_INPUT.Trim()
            $privateEngineRunIdSource = "input"
          }
          elseif (-not $isTagRelease -and [string]::IsNullOrWhiteSpace($privateEngineReleaseTag) -and -not [string]::IsNullOrWhiteSpace($env:PRIVATE_ENGINE_RUN_ID_PIN)) {
            $privateEngineRunId = $env:PRIVATE_ENGINE_RUN_ID_PIN.Trim()
            $privateEngineRunIdSource = "pin"
          }

          $defaultPrivateEngineRepo = "T-Hamada0101/IndigoMovieEngine"
          $defaultPublicMirrorRepo = "T-Hamada0101/IndigoMovieEngine-Mirror"
          $publicMirrorRepo = if (-not [string]::IsNullOrWhiteSpace("${{ vars.PUBLIC_ENGINE_MIRROR_REPO }}")) {
            "${{ vars.PUBLIC_ENGINE_MIRROR_REPO }}".Trim()
          }
          else {
            $defaultPublicMirrorRepo
          }

          function Get-PreferredSourceRepos {
            param(
              [string]$ReleaseTagValue,
              [string]$RunIdValue,
              [bool]$AllowRunIdFallback
            )

            $repos = New-Object System.Collections.Generic.List[string]
            if (-not [string]::IsNullOrWhiteSpace($ReleaseTagValue)) {
              if (-not [string]::IsNullOrWhiteSpace($publicMirrorRepo)) {
                $repos.Add($publicMirrorRepo)
              }
              $repos.Add($defaultPrivateEngineRepo)
              return @($repos | Select-Object -Unique)
            }

            if (-not [string]::IsNullOrWhiteSpace($RunIdValue)) {
              return @($defaultPrivateEngineRepo)
            }

            return @()
          }

          function Invoke-WorkerSync {
            param(
              [string]$ReleaseTagValue,
              [string]$RunIdValue
            )

            $candidateRepos = Get-PreferredSourceRepos -ReleaseTagValue $ReleaseTagValue -RunIdValue $RunIdValue
            $attemptErrors = New-Object System.Collections.Generic.List[string]

            foreach ($repo in $candidateRepos) {
              $needsToken = [string]::Equals($repo, $defaultPrivateEngineRepo, [System.StringComparison]::OrdinalIgnoreCase)
              if ($needsToken -and [string]::IsNullOrWhiteSpace($env:IMM_PRIVATE_ENGINE_TOKEN)) {
                $attemptErrors.Add("repo=$repo token=missing")
                continue
              }

              $syncArguments = @(
                "-NoLogo",
                "-NoProfile",
                "-File",
                "./scripts/sync_private_engine_worker_artifact.ps1",
                "-PrivateRepoFullName", $repo,
                "-GitHubToken", $env:IMM_PRIVATE_ENGINE_TOKEN
              )

              if (-not [string]::IsNullOrWhiteSpace($ReleaseTagValue)) {
                $syncArguments += @("-ReleaseTag", $ReleaseTagValue)
              }
              elseif (-not [string]::IsNullOrWhiteSpace($RunIdValue)) {
                $syncArguments += @("-RunId", $RunIdValue)
              }

              Write-Host "worker sync source repo: $repo"
              & pwsh @syncArguments
              if ($LASTEXITCODE -eq 0) {
                return
              }

              $attemptErrors.Add("repo=$repo exit=$LASTEXITCODE")
              if (-not [string]::IsNullOrWhiteSpace($ReleaseTagValue) -and -not [string]::Equals($repo, $defaultPrivateEngineRepo, [System.StringComparison]::OrdinalIgnoreCase)) {
                Write-Host "公開ミラー同期に失敗したため private repo へ fallback します。"
              }
            }

            if ($AllowRunIdFallback -and -not [string]::IsNullOrWhiteSpace($ReleaseTagValue) -and -not [string]::IsNullOrWhiteSpace($RunIdValue)) {
              Write-Host "release asset が揃わないため明示指定 run_id fallback を試行します: $RunIdValue"
              $syncArguments = @(
                "-NoLogo",
                "-NoProfile",
                "-File",
                "./scripts/sync_private_engine_worker_artifact.ps1",
                "-PrivateRepoFullName", $defaultPrivateEngineRepo,
                "-GitHubToken", $env:IMM_PRIVATE_ENGINE_TOKEN,
                "-RunId", $RunIdValue
              )

              & pwsh @syncArguments
              if ($LASTEXITCODE -eq 0) {
                return
              }

              $attemptErrors.Add("repo=$defaultPrivateEngineRepo runId=$RunIdValue exit=$LASTEXITCODE")
            }

            if (-not [string]::IsNullOrWhiteSpace($ReleaseTagValue)) {
              throw "Private GitHub Release asset の同期に失敗しました。 attempts=[$($attemptErrors -join '; ')]"
            }

            throw "Private engine publish artifact の同期に失敗しました。 attempts=[$($attemptErrors -join '; ')]"
          }

          if ([string]::IsNullOrWhiteSpace($privateEngineReleaseTag) -and [string]::IsNullOrWhiteSpace($privateEngineRunId)) {
            throw "private_engine_release_tag または private_engine_run_id を指定してください。repo variable を使う場合も空では実行できません。"
          }

          if ([string]::IsNullOrWhiteSpace($publicMirrorRepo) -and [string]::IsNullOrWhiteSpace($env:IMM_PRIVATE_ENGINE_TOKEN)) {
            throw "PUBLIC_ENGINE_MIRROR_REPO または INDIGO_ENGINE_REPO_TOKEN が必要です。"
          }

          if ([string]::IsNullOrWhiteSpace($privateEngineReleaseTag) -and [string]::IsNullOrWhiteSpace($env:IMM_PRIVATE_ENGINE_TOKEN)) {
            throw "private_engine_run_id 経路は INDIGO_ENGINE_REPO_TOKEN が必要です。"
          }

          if (-not [string]::IsNullOrWhiteSpace($privateEngineReleaseTag)) {
            Write-Host "private engine source mode: release_tag ($privateEngineReleaseTag)"
          }
          elseif ([string]::Equals($privateEngineRunIdSource, "pin", [System.StringComparison]::OrdinalIgnoreCase)) {
            Write-Host "private engine source mode: preview run_id pin ($privateEngineRunId)"
          }
          else {
            Write-Host "private engine source mode: run_id ($privateEngineRunId)"
          }

          Invoke-WorkerSync -ReleaseTagValue $privateEngineReleaseTag -RunIdValue $privateEngineRunId -AllowRunIdFallback ([string]::Equals($privateEngineRunIdSource, "input", [System.StringComparison]::OrdinalIgnoreCase))
          "synced=true" >> $env:GITHUB_OUTPUT

      - name: Try sync private engine packages
        id: sync_private_engine_packages
        shell: pwsh
        working-directory: IndigoMovieManager_fork
        env:
          IMM_PRIVATE_ENGINE_TOKEN: ${{ secrets.INDIGO_ENGINE_REPO_TOKEN }}
          PUBLIC_ENGINE_MIRROR_REPO: ${{ vars.PUBLIC_ENGINE_MIRROR_REPO }}
          PRIVATE_ENGINE_RUN_ID_INPUT: ${{ inputs.private_engine_run_id }}
          PRIVATE_ENGINE_RUN_ID_PIN: ${{ vars.PRIVATE_ENGINE_PUBLISH_RUN_ID }}
          PRIVATE_ENGINE_RELEASE_TAG_INPUT: ${{ inputs.private_engine_release_tag }}
          PRIVATE_ENGINE_RELEASE_TAG_PIN: ${{ vars.PRIVATE_ENGINE_RELEASE_TAG }}
        run: |
          $isTagRelease = "${{ github.ref_type }}" -eq "tag"
          $privateEngineReleaseTag = if (-not [string]::IsNullOrWhiteSpace($env:PRIVATE_ENGINE_RELEASE_TAG_INPUT)) {
            $env:PRIVATE_ENGINE_RELEASE_TAG_INPUT.Trim()
          }
          elseif (-not [string]::IsNullOrWhiteSpace($env:PRIVATE_ENGINE_RELEASE_TAG_PIN)) {
            $env:PRIVATE_ENGINE_RELEASE_TAG_PIN.Trim()
          }
          elseif ($isTagRelease) {
            "${{ github.ref_name }}".Trim()
          }
          else {
            ""
          }
          $privateEngineRunId = ""
          $privateEngineRunIdSource = ""
          if (-not [string]::IsNullOrWhiteSpace($env:PRIVATE_ENGINE_RUN_ID_INPUT)) {
            $privateEngineRunId = $env:PRIVATE_ENGINE_RUN_ID_INPUT.Trim()
            $privateEngineRunIdSource = "input"
          }
          elseif (-not $isTagRelease -and [string]::IsNullOrWhiteSpace($privateEngineReleaseTag) -and -not [string]::IsNullOrWhiteSpace($env:PRIVATE_ENGINE_RUN_ID_PIN)) {
            $privateEngineRunId = $env:PRIVATE_ENGINE_RUN_ID_PIN.Trim()
            $privateEngineRunIdSource = "pin"
          }

          $defaultPrivateEngineRepo = "T-Hamada0101/IndigoMovieEngine"
          $defaultPublicMirrorRepo = "T-Hamada0101/IndigoMovieEngine-Mirror"
          $publicMirrorRepo = if (-not [string]::IsNullOrWhiteSpace("${{ vars.PUBLIC_ENGINE_MIRROR_REPO }}")) {
            "${{ vars.PUBLIC_ENGINE_MIRROR_REPO }}".Trim()
          }
          else {
            $defaultPublicMirrorRepo
          }

          function Get-PreferredSourceRepos {
            param(
              [string]$ReleaseTagValue,
              [string]$RunIdValue,
              [bool]$AllowRunIdFallback
            )

            $repos = New-Object System.Collections.Generic.List[string]
            if (-not [string]::IsNullOrWhiteSpace($ReleaseTagValue)) {
              if (-not [string]::IsNullOrWhiteSpace($publicMirrorRepo)) {
                $repos.Add($publicMirrorRepo)
              }
              $repos.Add($defaultPrivateEngineRepo)
              return @($repos | Select-Object -Unique)
            }

            if (-not [string]::IsNullOrWhiteSpace($RunIdValue)) {
              return @($defaultPrivateEngineRepo)
            }

            return @()
          }

          function Invoke-PackageSync {
            param(
              [string]$ReleaseTagValue,
              [string]$RunIdValue
            )

            $candidateRepos = Get-PreferredSourceRepos -ReleaseTagValue $ReleaseTagValue -RunIdValue $RunIdValue
            $attemptErrors = New-Object System.Collections.Generic.List[string]

            foreach ($repo in $candidateRepos) {
              $needsToken = [string]::Equals($repo, $defaultPrivateEngineRepo, [System.StringComparison]::OrdinalIgnoreCase)
              if ($needsToken -and [string]::IsNullOrWhiteSpace($env:IMM_PRIVATE_ENGINE_TOKEN)) {
                $attemptErrors.Add("repo=$repo token=missing")
                continue
              }

              $syncArguments = @(
                "-NoLogo",
                "-NoProfile",
                "-File",
                "./scripts/sync_private_engine_packages.ps1",
                "-PrivateRepoFullName", $repo,
                "-GitHubToken", $env:IMM_PRIVATE_ENGINE_TOKEN
              )

              if (-not [string]::IsNullOrWhiteSpace($ReleaseTagValue)) {
                $syncArguments += @("-ReleaseTag", $ReleaseTagValue)
              }
              elseif (-not [string]::IsNullOrWhiteSpace($RunIdValue)) {
                $syncArguments += @("-RunId", $RunIdValue)
              }

              Write-Host "package sync source repo: $repo"
              & pwsh @syncArguments
              if ($LASTEXITCODE -eq 0) {
                return
              }

              $attemptErrors.Add("repo=$repo exit=$LASTEXITCODE")
              if (-not [string]::IsNullOrWhiteSpace($ReleaseTagValue) -and -not [string]::Equals($repo, $defaultPrivateEngineRepo, [System.StringComparison]::OrdinalIgnoreCase)) {
                Write-Host "公開ミラー同期に失敗したため private repo へ fallback します。"
              }
            }

            if ($AllowRunIdFallback -and -not [string]::IsNullOrWhiteSpace($ReleaseTagValue) -and -not [string]::IsNullOrWhiteSpace($RunIdValue)) {
              Write-Host "release asset が揃わないため明示指定 run_id fallback を試行します: $RunIdValue"
              $syncArguments = @(
                "-NoLogo",
                "-NoProfile",
                "-File",
                "./scripts/sync_private_engine_packages.ps1",
                "-PrivateRepoFullName", $defaultPrivateEngineRepo,
                "-GitHubToken", $env:IMM_PRIVATE_ENGINE_TOKEN,
                "-RunId", $RunIdValue
              )

              & pwsh @syncArguments
              if ($LASTEXITCODE -eq 0) {
                return
              }

              $attemptErrors.Add("repo=$defaultPrivateEngineRepo runId=$RunIdValue exit=$LASTEXITCODE")
            }

            if (-not [string]::IsNullOrWhiteSpace($ReleaseTagValue)) {
              throw "Private GitHub Release packages の同期に失敗しました。 attempts=[$($attemptErrors -join '; ')]"
            }

            throw "Private engine package artifact の同期に失敗しました。 attempts=[$($attemptErrors -join '; ')]"
          }

          if ([string]::IsNullOrWhiteSpace($privateEngineReleaseTag) -and [string]::IsNullOrWhiteSpace($privateEngineRunId)) {
            throw "private_engine_release_tag または private_engine_run_id を指定してください。repo variable を使う場合も空では実行できません。"
          }

          if ([string]::IsNullOrWhiteSpace($publicMirrorRepo) -and [string]::IsNullOrWhiteSpace($env:IMM_PRIVATE_ENGINE_TOKEN)) {
            throw "PUBLIC_ENGINE_MIRROR_REPO または INDIGO_ENGINE_REPO_TOKEN が必要です。"
          }

          if ([string]::IsNullOrWhiteSpace($privateEngineReleaseTag) -and [string]::IsNullOrWhiteSpace($env:IMM_PRIVATE_ENGINE_TOKEN)) {
            throw "private_engine_run_id 経路は INDIGO_ENGINE_REPO_TOKEN が必要です。"
          }

          if (-not [string]::IsNullOrWhiteSpace($privateEngineReleaseTag)) {
            Write-Host "private engine source mode: release_tag ($privateEngineReleaseTag)"
          }
          elseif ([string]::Equals($privateEngineRunIdSource, "pin", [System.StringComparison]::OrdinalIgnoreCase)) {
            Write-Host "private engine source mode: preview run_id pin ($privateEngineRunId)"
          }
          else {
            Write-Host "private engine source mode: run_id ($privateEngineRunId)"
          }

          Invoke-PackageSync -ReleaseTagValue $privateEngineReleaseTag -RunIdValue $privateEngineRunId -AllowRunIdFallback ([string]::Equals($privateEngineRunIdSource, "input", [System.StringComparison]::OrdinalIgnoreCase))
          "synced=true" >> $env:GITHUB_OUTPUT

      - name: Create release package
        shell: pwsh
        working-directory: IndigoMovieManager_fork
        run: |
          # タグ実行時はタグ名をそのまま配布ラベルへ流し、手動実行時は run 番号へ逃がす。
          $versionLabel = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}" } else { "manual-${{ github.run_number }}" }
          $packageArguments = @(
            "-NoLogo",
            "-NoProfile",
            "-File",
            "./scripts/create_github_release_package.ps1",
            "-Configuration",
            "Release",
            "-Runtime",
            "win-x64",
            "-OutputRoot",
            "artifacts/github-release",
            "-VersionLabel",
            $versionLabel
          )

          # Public workflow は local source build へ戻らず、Private source を同期した publish を正本として使う。
          if ("${{ steps.sync_private_engine.outputs.synced }}" -ne "true") {
            throw "Private engine publish source の同期結果が取得できませんでした。"
          }
          if ("${{ steps.sync_private_engine_packages.outputs.synced }}" -ne "true") {
            throw "Private engine packages の同期結果が取得できませんでした。"
          }

          $packageArguments += @(
            "-PreparedWorkerPublishDir",
            "artifacts/rescue-worker/publish/Release-win-x64",
            "-PreparedPrivateEnginePackageDir",
            "artifacts/private-engine-packages/Release"
          )

          & pwsh @packageArguments
          if ($LASTEXITCODE -ne 0) {
            throw "release package 作成に失敗しました。"
          }

      - name: Create WiX installer
        shell: pwsh
        working-directory: IndigoMovieManager_fork
        run: |
          $versionLabel = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}" } else { "manual-${{ github.run_number }}" }
          $packageDir = Join-Path "artifacts/github-release/package" "IndigoMovieManager-$versionLabel-win-x64"
          $installerArguments = @(
            "-NoLogo",
            "-NoProfile",
            "-File",
            "./scripts/create_wix_installer_from_release_package.ps1",
            "-Configuration",
            "Release",
            "-Runtime",
            "win-x64",
            "-VersionLabel",
            $versionLabel,
            "-PackageDir",
            $packageDir,
            "-OutputRoot",
            "artifacts/github-release/installer"
          )

          & pwsh @installerArguments
          if ($LASTEXITCODE -ne 0) {
            throw "WiX installer 作成に失敗しました。"
          }

      - name: Upload app release artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-release-package
          path: IndigoMovieManager_fork/artifacts/github-release/*.zip
          if-no-files-found: error

      - name: Upload WiX installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-release-installer
          path: IndigoMovieManager_fork/artifacts/github-release/installer/*.exe
          if-no-files-found: error

      - name: Upload release body preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-release-body-preview
          path: IndigoMovieManager_fork/artifacts/github-release/release-worker-lock-summary-*.md
          if-no-files-found: error

      - name: Show release body preview in workflow summary
        shell: pwsh
        working-directory: IndigoMovieManager_fork
        run: |
          $summaryFile = Get-ChildItem -Path artifacts/github-release -Filter 'release-worker-lock-summary-*.md' -File | Select-Object -First 1
          if ($null -eq $summaryFile) {
            throw "release body preview markdown が見つかりません。"
          }

          $summaryContent = Get-Content -LiteralPath $summaryFile.FullName -Raw -Encoding utf8
          $releaseBodyBlockMatch = [regex]::Match($summaryContent, '(?s)~~~md\s*(.+?)\s*~~~')
          if (-not $releaseBodyBlockMatch.Success) {
            throw "release body preview markdown の本文ブロックを抽出できません。"
          }

          $summaryText = @"
          ## Release Body Preview

          Source: `$($summaryFile.Name)`

          $($releaseBodyBlockMatch.Groups[1].Value.Trim())
          "@

          $utf8NoBom = [System.Text.UTF8Encoding]::new($false)
          [System.IO.File]::AppendAllText($env:GITHUB_STEP_SUMMARY, $summaryText, $utf8NoBom)

      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            IndigoMovieManager_fork/artifacts/github-release/*.zip
            IndigoMovieManager_fork/artifacts/github-release/installer/*.exe
          body_path: IndigoMovieManager_fork/artifacts/github-release/release-worker-lock-summary-${{ github.ref_name }}-win-x64.md
          generate_release_notes: true
