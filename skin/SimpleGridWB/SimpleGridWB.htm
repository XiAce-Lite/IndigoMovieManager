<html>
<head>
  <meta charset="utf-8">
  <link type="text/css" rel="stylesheet" href="./SimpleGridWB.css">
  <script type="text/javascript" src="../prototype.js"></script>
  <script type="text/javascript" src="../wblib.js"></script>
</head>
<body>
  <div class="shell">
    <div class="hero">
      <div class="hero__eyebrow">SimpleGridWB</div>
      <div class="hero__title" id="skinName">External Skin</div>
      <div class="hero__meta">
        <span id="dbName">DB</span>
        <span class="hero__dot">/</span>
        <span id="resultCount">0 items</span>
      </div>
    </div>

    <div class="toolbar">
      <input id="searchInput" class="toolbar__input" type="text" placeholder="検索ワード">
      <button id="searchButton" class="toolbar__button toolbar__button--primary" type="button">検索</button>
      <button id="clearButton" class="toolbar__button" type="button">クリア</button>
      <button id="reloadButton" class="toolbar__button" type="button">再読込</button>
    </div>

    <div id="status" class="status">読み込み中...</div>
    <div id="view" class="grid"></div>
    <div class="pager">
      <button id="loadMoreButton" class="toolbar__button pager__button" type="button" style="display:none">続きを読み込む</button>
    </div>
  </div>

  <script type="text/javascript">
    // 今の互換ランタイムで確実に動くよう、update/find/getInfos の戻りだけで画面を組み立てる。
    var simpleGridState = {
      items: [],
      totalCount: 0,
      currentKeyword: "",
      loadingMore: false,
      scrollPumpScheduled: false,
      appendExhausted: false
    };

    function getItems(payload) {
      if (payload && payload.Items && payload.Items.length !== undefined) {
        return payload.Items;
      }
      if (payload && payload.items && payload.items.length !== undefined) {
        return payload.items;
      }
      if (payload && payload.length !== undefined) {
        return payload;
      }
      return [];
    }

    function getTotalCount(payload) {
      if (payload && typeof payload.TotalCount === "number") {
        return payload.TotalCount;
      }
      if (payload && typeof payload.totalCount === "number") {
        return payload.totalCount;
      }
      return getItems(payload).length;
    }

    function escapeHtml(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function getMovieKey(movie) {
      return String(
        movie.RecordKey
        || movie.recordKey
        || movie.MovieId
        || movie.movieId
        || movie.Id
        || movie.id
        || ""
      );
    }

    function mergeMovieItems(baseItems, nextItems) {
      var merged = [];
      var indexByKey = {};
      var i;

      for (i = 0; i < baseItems.length; i += 1) {
        var baseMovie = baseItems[i] || {};
        var baseKey = getMovieKey(baseMovie) || ("base:" + String(i));
        indexByKey[baseKey] = merged.length;
        merged.push(baseMovie);
      }

      for (i = 0; i < nextItems.length; i += 1) {
        var nextMovie = nextItems[i] || {};
        var nextKey = getMovieKey(nextMovie) || ("next:" + String(i));
        if (Object.prototype.hasOwnProperty.call(indexByKey, nextKey)) {
          merged[indexByKey[nextKey]] = nextMovie;
          continue;
        }

        indexByKey[nextKey] = merged.length;
        merged.push(nextMovie);
      }

      return merged;
    }

    function updateResultSummary() {
      var resultCount = $("resultCount");
      if (!resultCount) {
        return;
      }

      var renderedCount = simpleGridState.items ? simpleGridState.items.length : 0;
      if (simpleGridState.totalCount > renderedCount) {
        resultCount.textContent = String(renderedCount) + " / " + String(simpleGridState.totalCount) + " items";
        return;
      }

      resultCount.textContent = String(simpleGridState.totalCount) + " items";
    }

    function updateLoadMoreButton() {
      var button = $("loadMoreButton");
      if (!button) {
        return;
      }

      var hasMore = !simpleGridState.appendExhausted && simpleGridState.items.length < simpleGridState.totalCount;
      button.style.display = hasMore ? "inline-flex" : "none";
      button.disabled = simpleGridState.loadingMore;
      button.textContent = simpleGridState.loadingMore ? "読み込み中..." : "続きを読み込む";
    }

    function updateStatusText(prefix) {
      var renderedCount = simpleGridState.items ? simpleGridState.items.length : 0;
      var suffix = simpleGridState.totalCount > renderedCount
        ? " (" + String(renderedCount) + " / " + String(simpleGridState.totalCount) + ")"
        : "";
      var baseText = simpleGridState.currentKeyword
        ? '検索: "' + simpleGridState.currentKeyword + '"'
        : "全件表示";
      $("status").textContent = prefix ? (prefix + suffix) : (baseText + suffix);
    }

    function isNearGridBottom() {
      var view = $("view");
      if (!view) {
        return false;
      }

      return view.scrollTop + view.clientHeight + 96 >= view.scrollHeight;
    }

    function scheduleAutoLoadMore() {
      if (
        simpleGridState.scrollPumpScheduled
        || simpleGridState.loadingMore
        || simpleGridState.appendExhausted
      ) {
        return;
      }

      simpleGridState.scrollPumpScheduled = true;
      setTimeout(function () {
        simpleGridState.scrollPumpScheduled = false;
        if (isNearGridBottom()) {
          loadMoreMovies();
        }
      }, 0);
    }

    function renderGrid() {
      var view = $("view");
      if (!view) {
        return;
      }

      if (!simpleGridState.items || simpleGridState.items.length < 1) {
        view.innerHTML = '<div class="empty">対象がありません。</div>';
        updateResultSummary();
        updateLoadMoreButton();
        return;
      }

      var html = "";
      for (var i = 0; i < simpleGridState.items.length; i += 1) {
        var movie = simpleGridState.items[i] || {};
        var tags = movie.Tags || movie.tags || [];
        var tagHtml = "";
        for (var tagIndex = 0; tagIndex < tags.length; tagIndex += 1) {
          tagHtml += '<span class="card__tag">' + escapeHtml(tags[tagIndex]) + "</span>";
        }

        html += ''
          + '<button class="card' + (movie.Selected ? " is-selected" : "") + '"'
          + ' type="button" onclick="focusMovie(' + Number(movie.MovieId || movie.movieId || 0) + ')">'
          +   '<div class="card__thumbWrap">'
          +     '<img class="card__thumb' + (movie.Exists === false ? " is-missing" : "") + '"'
          +       ' src="' + escapeHtml(movie.ThumbUrl || movie.thumbUrl || "") + '"'
          +       ' alt="' + escapeHtml(movie.MovieName || movie.movieName || "") + '">'
          +   '</div>'
          +   '<div class="card__body">'
          +     '<div class="card__title">' + escapeHtml(movie.MovieName || movie.movieName || "") + '</div>'
          +     '<div class="card__sub">'
          +       '<span>' + escapeHtml(movie.Length || movie.length || "") + '</span>'
          +       '<span>score ' + escapeHtml(movie.Score || movie.score || 0) + '</span>'
          +     '</div>'
          +     '<div class="card__tags">' + tagHtml + '</div>'
          +   '</div>'
          + '</button>';
      }

      view.innerHTML = html;
      updateResultSummary();
      updateLoadMoreButton();
      scheduleAutoLoadMore();
    }

    function applyResponse(payload, appendMode) {
      var nextItems = getItems(payload);
      if (appendMode) {
        var previousCount = simpleGridState.items ? simpleGridState.items.length : 0;
        var mergedItems = mergeMovieItems(simpleGridState.items || [], nextItems);
        // 追加要求なのに件数が増えない時は、空振りとして次回要求を止める。
        simpleGridState.appendExhausted = mergedItems.length <= previousCount;
        simpleGridState.items = mergedItems;
      } else {
        simpleGridState.items = nextItems;
        simpleGridState.appendExhausted = false;
      }
      simpleGridState.totalCount = Math.max(getTotalCount(payload), simpleGridState.items.length);
      if (simpleGridState.appendExhausted) {
        simpleGridState.totalCount = simpleGridState.items.length;
      }
      renderGrid();
      updateStatusText("");
    }

    function refreshMovies() {
      simpleGridState.loadingMore = false;
      updateLoadMoreButton();
      $("status").textContent = "読み込み中...";
      return wb.update(0).then(function (payload) {
        applyResponse(payload, false);
        return payload;
      }).catch(function (error) {
        $("status").textContent = "読み込み失敗";
        if (wb.trace) {
          wb.trace("SimpleGridWB update failed: " + error.message);
        }
      });
    }

    function executeSearch() {
      var input = $("searchInput");
      simpleGridState.currentKeyword = input ? input.value : "";
      $("status").textContent = "検索中...";

      if (!simpleGridState.currentKeyword) {
        return refreshMovies();
      }

      return wb.find(simpleGridState.currentKeyword, 0).then(function (payload) {
        applyResponse(payload, false);
        return payload;
      }).catch(function (error) {
        $("status").textContent = "検索失敗";
        if (wb.trace) {
          wb.trace("SimpleGridWB find failed: " + error.message);
        }
      });
    }

    function loadMoreMovies() {
      if (
        simpleGridState.loadingMore
        || simpleGridState.appendExhausted
        || simpleGridState.items.length >= simpleGridState.totalCount
      ) {
        return Promise.resolve(false);
      }

      simpleGridState.loadingMore = true;
      updateLoadMoreButton();
      $("status").textContent = "続きを読み込み中...";

      // いま見えている結果順を保ったまま、続きだけを追加で取りに行く。
      return wb.getInfos(simpleGridState.items.length).then(function (payload) {
        applyResponse(payload, true);
        return true;
      }).catch(function (error) {
        $("status").textContent = "追加読み込み失敗";
        if (wb.trace) {
          wb.trace("SimpleGridWB getInfos failed: " + error.message);
        }
        return false;
      }).then(function (succeeded) {
        simpleGridState.loadingMore = false;
        updateLoadMoreButton();
        if (succeeded) {
          updateStatusText("");
        }
        return succeeded;
      });
    }

    function focusMovie(movieId) {
      wb.focusThum(movieId).catch(function (error) {
        if (wb.trace) {
          wb.trace("SimpleGridWB focus failed: " + error.message);
        }
      });
    }

    function bindToolbar() {
      $("searchButton").onclick = function () {
        executeSearch();
      };
      $("clearButton").onclick = function () {
        $("searchInput").value = "";
        simpleGridState.currentKeyword = "";
        refreshMovies();
      };
      $("reloadButton").onclick = function () {
        refreshMovies();
      };
      $("loadMoreButton").onclick = function () {
        loadMoreMovies();
      };
      // 見えている末尾まで来た時は、ボタンを押さなくても次ページを継ぎ足す。
      $("view").onscroll = function () {
        scheduleAutoLoadMore();
      };
      $("searchInput").onkeydown = function (event) {
        if (event.key === "Enter") {
          executeSearch();
        }
      };
    }

    function loadHeader() {
      wb.getSkinName().then(function (name) {
        $("skinName").textContent = name || "External Skin";
      });
      wb.getDBName().then(function (name) {
        $("dbName").textContent = name || "DB";
      });
    }

    // compat 側から onUpdate が飛んでも描画が崩れないよう、同じ反映関数へ寄せる。
    function onUpdate(payload) {
      applyResponse(payload, false);
    }

    document.addEventListener("DOMContentLoaded", function () {
      bindToolbar();
      loadHeader();
      refreshMovies();
    });
  </script>

  <div id="config">
    skin-version : 1;
    multi-select : 1;
    seamless-scroll : 0;
    scroll-id : view;
    thum-width : 160;
    thum-height : 120;
    thum-column : 1;
    thum-row : 1;
  </div>
</body>
</html>
